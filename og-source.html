<!doctype html>
<!-- Fuente de la imagen Open Graph (1200x630). No se despliega: está en el ignore de firebase.json.
     Regenerar con: msedge --headless --window-size=1200,630 --screenshot=assets/og-image.png og-source.html -->
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{
  font-family:'Inter',sans-serif;color:#fff;position:relative;
  background:#0E3C12;
}
/* Mesh de luz: orbes radiales de la paleta */
.mesh{position:absolute;inset:0;
  background:
    radial-gradient(720px 560px at 88% -10%, rgba(76,175,80,.38), transparent 62%),
    radial-gradient(640px 520px at -6% 110%, rgba(129,199,132,.22), transparent 60%),
    radial-gradient(900px 700px at 50% 120%, rgba(27,94,32,.85), transparent 70%),
    linear-gradient(135deg,#123F16 0%,#0E3C12 55%,#0A2E0E 100%);
}
/* Trama sutil de puntos para textura física */
.dots{position:absolute;inset:0;opacity:.14;
  background-image:radial-gradient(rgba(255,255,255,.5) 1px, transparent 1px);
  background-size:26px 26px;
  -webkit-mask-image:radial-gradient(700px 500px at 75% 40%, #000, transparent 75%);
          mask-image:radial-gradient(700px 500px at 75% 40%, #000, transparent 75%);
}
.card{position:relative;width:100%;height:100%;padding:72px 80px;display:flex;align-items:center;gap:56px}

/* Columna izquierda: editorial */
.left{flex:1;min-width:0}
.eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  padding:9px 18px;border-radius:999px;
  background:rgba(255,255,255,.08);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.14), 0 0 0 1px rgba(255,255,255,.14);
  font-size:15px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  color:#C8E6C9;margin-bottom:34px;
}
.eyebrow .flag{display:inline-flex;border-radius:3px;overflow:hidden;width:21px;height:14px;box-shadow:0 0 0 1px rgba(255,255,255,.2)}
.eyebrow .flag i{flex:1;display:block}
.eyebrow .flag i:nth-child(1),.eyebrow .flag i:nth-child(3){background:#D91023}
.eyebrow .flag i:nth-child(2){background:#fff}
h1{font-size:64px;font-weight:800;line-height:1.06;letter-spacing:-.03em}
h1 .hl{background:linear-gradient(92deg,#81C784,#B9F6CA);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{margin-top:24px;font-size:23px;font-weight:500;line-height:1.45;color:rgba(255,255,255,.78);max-width:540px}
.domain{
  margin-top:40px;display:inline-flex;align-items:center;gap:14px;
  font-size:26px;font-weight:700;letter-spacing:-.01em;
}
.domain .pill{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 26px;border-radius:999px;background:#F57C00;color:#fff;
  box-shadow:0 14px 34px rgba(245,124,0,.38), inset 0 1px 1px rgba(255,255,255,.3);
}
.domain .url{color:#C8E6C9}

/* Columna derecha: ícono en doble bisel + tarjetas flotantes */
.right{position:relative;width:360px;height:100%;flex-shrink:0}
.bezel{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  padding:16px;border-radius:56px;
  background:rgba(255,255,255,.07);
  box-shadow:0 0 0 1px rgba(255,255,255,.16), inset 0 1px 1px rgba(255,255,255,.12), 0 40px 90px rgba(0,0,0,.45);
}
.bezel .core{
  width:216px;height:216px;border-radius:42px;background:#fff;
  display:grid;place-items:center;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.9), inset 0 -14px 30px rgba(14,60,18,.08);
}
.bezel .core img{width:172px;height:172px;object-fit:contain}
.stat{
  position:absolute;display:flex;align-items:center;gap:12px;
  padding:16px 22px;border-radius:22px;background:#fff;color:#212121;
  box-shadow:0 24px 60px rgba(0,0,0,.38), inset 0 1px 1px rgba(255,255,255,.9);
  white-space:nowrap;
}
.stat .ic{
  width:42px;height:42px;border-radius:14px;display:grid;place-items:center;
  font-size:21px;flex-shrink:0;
}
.stat b{display:block;font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.stat small{display:block;font-size:13.5px;font-weight:600;color:#757575;margin-top:2px}
.stat.cuyes{top:64px;right:-14px;transform:rotate(2.5deg)}
.stat.cuyes .ic{background:#E8F5E9}
.stat.ventas{bottom:70px;left:-26px;transform:rotate(-2.5deg)}
.stat.ventas .ic{background:#FFF3E0}
.stat.ventas b{color:#2E7D32}
</style>
</head>
<body>
<div class="mesh"></div>
<div class="dots"></div>
<div class="card">
  <div class="left">
    <span class="eyebrow"><span class="flag"><i></i><i></i><i></i></span>Hecho en Perú · Gratis para empezar</span>
    <h1>Gestiona tu criadero de cuyes <span class="hl">desde tu celular</span></h1>
    <p class="sub">Nacimientos, ventas, sanidad, peso y más — la app más completa del Perú para criadores.</p>
    <div class="domain">
      <span class="pill">▶ Google Play</span>
      <span class="url">quwi.pe</span>
    </div>
  </div>
  <div class="right">
    <div class="bezel"><div class="core"><img src="assets/quwi-icon.png" alt=""></div></div>
    <div class="stat cuyes"><span class="ic">🐹</span><span><b>1,284</b><small>cuyes registrados</small></span></div>
    <div class="stat ventas"><span class="ic">📈</span><span><b>S/ 4,820</b><small>ventas del mes</small></span></div>
  </div>
</div>
</body>
</html>
